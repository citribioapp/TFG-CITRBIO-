# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Controller\OrderController:
        arguments:
            $orderNotificationFrom: '%env(string:MAILER_FROM)%'
            $orderNotificationTo: '%env(string:ORDER_NOTIFICATION_EMAIL)%'
            $frontendUrl: '%env(string:FRONTEND_URL)%'
            $logoGrandeUrl: '%env(string:LOGO_GRANDE_URL)%'
            $logoPequenoUrl: '%env(string:LOGO_PEQUENO_URL)%'
            $bankIban: '%env(string:CITRIBIO_BANK_IBAN)%'

    App\Controller\PublicOrderPaymentController:
        arguments:
            $orderNotificationTo: '%env(string:ORDER_NOTIFICATION_EMAIL)%'
            $orderNotificationFrom: '%env(string:MAILER_FROM)%'
            $frontendUrl: '%env(string:FRONTEND_URL)%'
            $logoGrandeUrl: '%env(string:LOGO_GRANDE_URL)%'

    App\Controller\AuthController:
        arguments:
            $mailerFrom: '%env(string:MAILER_FROM)%'

    App\Controller\ContactController:
        arguments:
            $contactToEmail: '%env(string:CONTACT_TO_EMAIL)%'
            $contactFromEmail: '%env(string:CONTACT_FROM_EMAIL)%'
            $contactLogoUrl: '%env(string:CONTACT_LOGO_URL)%'

    App\Service\ResendMailer:
        arguments:
            $resendApiKey: '%env(string:RESEND_API_KEY)%'
            $mailerFrom: '%env(MAILER_FROM)%'

    App\EventSubscriber\CorsSubscriber:
        arguments:
            # %env(csv:...)% returns string[] — the constructor also accepts a raw
            # comma-separated string as a safety fallback.
            $allowedOrigins: '%env(csv:CORS_ALLOW_ORIGINS)%'
            $allowedMethods: '%env(csv:CORS_ALLOW_METHODS)%'
            $allowedHeaders: '%env(csv:CORS_ALLOW_HEADERS)%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
