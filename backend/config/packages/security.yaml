security:
    password_hashers:
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # OPTIONS preflight requests must bypass all security so CorsSubscriber
        # can respond with 204 + CORS headers before any auth check runs.
        cors_preflight:
            pattern: ^/api
            methods: [OPTIONS]
            stateless: true
            security: false

        # LOGIN
        login:
            pattern: ^/api/login$
            stateless: true
            provider: app_user_provider
            
            json_login:
                check_path: /api/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        # 🔹 PUBLIC ENDPOINTS (IMPORTANTE)
        public:
            pattern: '^/api/(register|forgot-password|reset-password|contact)$'
            stateless: true
            security: false

        # 🔹 PUBLIC: payment proof page — no JWT required
        payment_proof:
            pattern: '^/api/orders/\d+/payment-proof$'
            stateless: true
            security: false

        # 🔹 PROTEGIDO CON JWT
        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            
            jwt: ~

    access_control:
    - { path: ^/api/doc, roles: PUBLIC_ACCESS }
    - { path: ^/api/login$, roles: PUBLIC_ACCESS }
    - { path: ^/api/register$, roles: PUBLIC_ACCESS }
    - { path: ^/api/forgot-password$, roles: PUBLIC_ACCESS }
    - { path: ^/api/reset-password$, roles: PUBLIC_ACCESS }
    - { path: ^/api/contact$, roles: PUBLIC_ACCESS }
    - { path: '^/api/orders/\d+/payment-proof$', roles: PUBLIC_ACCESS }
    - { path: ^/api/categories$, roles: PUBLIC_ACCESS, methods: [GET] }
    - { path: '^/api/categories/\d+/products$', roles: PUBLIC_ACCESS, methods: [GET] }
    - { path: ^/api/products$, roles: PUBLIC_ACCESS, methods: [GET] }
    - { path: '^/api/products/\d+$', roles: PUBLIC_ACCESS, methods: [GET] }
    - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }
