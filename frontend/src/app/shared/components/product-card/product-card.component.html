<article
  [routerLink]="['/productos', productId]"
  [queryParams]="categorySlug ? { category: categorySlug } : {}"
  class="group rounded-citri-lg shadow-citri-card bg-white overflow-hidden hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200 cursor-pointer flex flex-col h-full"
>
  <!-- Image with optional out-of-season overlay badge -->
  <div class="aspect-[4/3] bg-citri-gray-100 overflow-hidden shrink-0 relative">
    @if (image && !imageError()) {
      <img [src]="image" [alt]="name" (error)="onImageError()"
        loading="lazy"
        decoding="async"
        class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500 img-fade"
        (load)="$any($event.target).classList.add('loaded')" />
    } @else {
      <div class="w-full h-full flex items-center justify-center bg-citri-yellow-light">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" class="w-16 h-16" aria-hidden="true">
          <circle cx="32" cy="32" r="28" fill="#f97316" />
          <circle cx="32" cy="32" r="18" fill="#fb923c" />
          <circle cx="32" cy="32" r="8" fill="#fed7aa" />
        </svg>
      </div>
    }
    <!-- Out-of-season badge -->
    @if (isOutOfSeason) {
      <div class="absolute inset-0 bg-black/20 pointer-events-none"></div>
      <span class="absolute top-2 left-2 inline-flex items-center gap-1 px-2 py-1 rounded-full bg-orange-100 border border-orange-300 text-orange-700 text-[11px] font-bold uppercase tracking-wide shadow-sm">
        <svg class="w-3 h-3 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
        </svg>
        Fuera de temporada
      </span>
    }
  </div>

  <div class="p-5 flex flex-col flex-1 justify-between">
    <div class="flex-1 mb-4">
      <h3 class="font-citri-sans font-bold text-citri-gray-900 text-base mb-1 group-hover:text-citri-green transition-colors">
        {{ name }}
      </h3>
      <p class="text-citri-gray-600 text-sm line-clamp-2">{{ description || 'Cítrico de origen mediterráneo.' }}</p>
    </div>
    @if (isAdmin()) {
      <button
        type="button"
        (click)="onEditProduct($event)"
        class="inline-flex items-center justify-center gap-2 w-full px-4 py-2.5 bg-citri-green text-white text-sm font-semibold rounded-citri-sm hover:bg-citri-green-dark transition-colors duration-200"
      >
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931zm0 0L19.5 7.125" />
        </svg>
        Editar producto
      </button>
    } @else if (isOutOfSeason) {
      <button
        type="button"
        (click)="onAddToCart($event)"
        class="inline-flex items-center justify-center gap-2 w-full px-4 py-2.5 bg-citri-green text-white text-sm font-semibold rounded-citri-sm hover:bg-citri-green-dark transition-colors duration-200"
      >
        <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="16" x2="12" y2="12" />
          <line x1="12" y1="8" x2="12.01" y2="8" stroke-width="2.5" />
        </svg>
        Ver detalles
      </button>
    } @else {
      <button
        type="button"
        (click)="onAddToCart($event)"
        class="inline-flex items-center justify-center gap-2 w-full px-4 py-2.5 bg-citri-green text-white text-sm font-semibold rounded-citri-sm hover:bg-citri-green-dark transition-colors duration-200"
      >
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3.75h1.386a1.5 1.5 0 0 1 1.456 1.14l.383 1.53m0 0H19.5l-1.5 7.5H8.214m-2.739-7.5L6.75 15.75A1.5 1.5 0 0 0 8.214 17.25H18" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 20.25a.75.75 0 1 1 0-1.5a.75.75 0 0 1 0 1.5Zm9 0a.75.75 0 1 1 0-1.5a.75.75 0 0 1 0 1.5Z" />
        </svg>
        Añadir al carrito
      </button>
    }
  </div>
</article>
