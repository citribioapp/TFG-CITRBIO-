<!-- Backdrop -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 px-4"
  role="dialog"
  aria-modal="true"
  [attr.aria-labelledby]="'confirm-modal-title'"
  (keydown.escape)="cancelled.emit()"
>
  <div class="w-full max-w-md bg-white rounded-citri-lg shadow-citri-nav p-6">
    <h2 id="confirm-modal-title" class="font-citri-sans font-bold text-citri-gray-900 text-lg">{{ title() }}</h2>
    <p class="mt-2 text-sm text-citri-gray-600">{{ message() }}</p>

    <div class="mt-6 flex justify-end gap-3">
      <button
        type="button"
        [disabled]="loading()"
        (click)="cancelled.emit()"
        class="px-4 py-2 text-sm font-medium rounded-citri-sm border border-citri-gray-300 text-citri-gray-900 hover:border-citri-green hover:text-citri-green transition-colors disabled:opacity-50"
      >
        {{ cancelLabel() }}
      </button>

      <button
        type="button"
        [disabled]="loading()"
        (click)="confirmed.emit()"
        [class]="destructive()
          ? 'px-4 py-2 text-sm font-semibold rounded-citri-sm bg-red-600 text-white hover:bg-red-700 transition-colors disabled:opacity-50'
          : 'px-4 py-2 text-sm font-semibold rounded-citri-sm bg-citri-green text-white hover:bg-citri-green-dark transition-colors disabled:opacity-50'"
      >
        {{ confirmLabel() }}
      </button>
    </div>
  </div>
</div>
