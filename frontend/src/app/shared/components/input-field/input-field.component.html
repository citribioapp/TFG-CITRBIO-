<label class="block text-sm font-medium text-citri-gray-900 mb-1">{{ label }}</label>
<input
  [type]="type"
  [placeholder]="placeholder"
  [value]="value()"
  [disabled]="disabled()"
  [ngClass]="hasError
    ? 'border-red-500 focus:ring-red-300'
    : 'border-citri-gray-300 focus:border-citri-green focus:ring-citri-green/20'"
  class="w-full px-3 py-2.5 rounded-citri-sm border text-citri-gray-900 text-sm transition-colors duration-200 focus:outline-none focus:ring-2"
  (input)="onInput($event)"
  (blur)="onBlur()"
/>
@if (hasError) {
  <p class="text-red-600 text-sm mt-1">{{ errorMessage }}</p>
}
