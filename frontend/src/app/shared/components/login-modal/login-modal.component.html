<!-- Overlay -->
<div
  class="modal-overlay fixed inset-0 z-[200] flex items-center justify-center bg-black/50 px-4"
  (click)="onOverlayClick($event)"
  role="dialog"
  aria-modal="true"
  aria-labelledby="login-modal-title"
>
  <!-- Panel -->
  <div class="relative w-full max-w-sm bg-white rounded-citri-lg shadow-xl p-8">

    <!-- Close button -->
    <button
      type="button"
      (click)="cancel.emit()"
      class="absolute top-4 right-4 text-citri-gray-400 hover:text-citri-gray-600 transition-colors"
      aria-label="Cerrar"
    >
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>

    <!-- Icon -->
    <div class="w-14 h-14 mx-auto mb-5 rounded-citri-full bg-citri-green-light flex items-center justify-center">
      <svg class="w-7 h-7 text-citri-green" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3.75h1.386a1.5 1.5 0 0 1 1.456 1.14l.383 1.53m0 0H19.5l-1.5 7.5H8.214m-2.739-7.5L6.75 15.75A1.5 1.5 0 0 0 8.214 17.25H18" />
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 20.25a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5Zm9 0a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5Z" />
      </svg>
    </div>

    <!-- Content -->
    <h2 id="login-modal-title" class="font-citri-sans font-bold text-citri-gray-900 text-xl text-center mb-2">
      Inicia sesión para continuar
    </h2>
    <p class="text-citri-gray-600 text-sm text-center leading-relaxed mb-7">
      Para añadir productos al carrito, primero debes iniciar sesión.
    </p>

    <!-- Actions -->
    <div class="flex flex-col gap-3">
      <button
        type="button"
        (click)="confirm.emit()"
        class="w-full px-6 py-3 bg-citri-green text-white font-semibold rounded-citri-md hover:bg-citri-green-dark transition-colors duration-200 text-sm"
      >
        Iniciar sesión
      </button>
      <button
        type="button"
        (click)="cancel.emit()"
        class="w-full px-6 py-3 border-2 border-citri-gray-300 text-citri-gray-600 font-semibold rounded-citri-md hover:border-citri-gray-400 hover:text-citri-gray-900 transition-colors duration-200 text-sm"
      >
        Cancelar
      </button>
    </div>

  </div>
</div>
