<div class="relative">
  <!-- Trigger button -->
  <button
    type="button"
    (click)="toggleDropdown()"
    [disabled]="isDisabled"
    aria-haspopup="listbox"
    [attr.aria-expanded]="isOpen()"
    aria-label="Seleccionar prefijo de país"
    class="flex items-center gap-1.5 shrink-0 px-2.5 py-2.5 rounded-citri-sm border border-citri-gray-300 bg-white text-citri-gray-900 text-sm focus:outline-none focus:ring-2 focus:border-citri-green focus:ring-citri-green/20 transition-colors hover:border-citri-green disabled:opacity-50 disabled:cursor-not-allowed"
  >
    <span
      class="fi"
      [class]="'fi-' + selectedCountry().code"
      style="width:20px;height:15px;border-radius:2px;display:inline-block;flex-shrink:0"
    ></span>
    <span class="font-medium tabular-nums">{{ selectedCountry().prefix }}</span>
    <!-- Chevron -->
    <svg
      class="w-3.5 h-3.5 text-citri-gray-600 transition-transform duration-150"
      [ngClass]="{ 'rotate-180': isOpen() }"
      fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"
    >
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
    </svg>
  </button>

  <!-- Dropdown -->
  @if (isOpen()) {
    <ul
      role="listbox"
      aria-label="Prefijos de país"
      class="absolute z-50 mt-1 left-0 min-w-[160px] bg-white border border-citri-gray-300 rounded-citri-md shadow-citri-card overflow-hidden"
    >
      @for (country of countries; track country.code) {
        <li
          role="option"
          [attr.aria-selected]="country.prefix === selectedCountry().prefix"
          (click)="select(country)"
          class="flex items-center gap-2.5 px-3 py-2 text-sm text-citri-gray-900 cursor-pointer transition-colors hover:bg-citri-green-light"
          [ngClass]="{ 'bg-citri-green-light font-semibold': country.prefix === selectedCountry().prefix }"
        >
          <span
            class="fi"
            [class]="'fi-' + country.code"
            style="width:20px;height:15px;border-radius:2px;display:inline-block;flex-shrink:0"
          ></span>
          <span class="tabular-nums font-medium">{{ country.prefix }}</span>
          <span class="text-citri-gray-600 truncate">{{ country.name }}</span>
        </li>
      }
    </ul>
  }
</div>
