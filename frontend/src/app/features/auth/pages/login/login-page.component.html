<div class="min-h-screen bg-citri-gray-50 flex items-center justify-center px-4 pt-4 pb-8 md:pt-6 md:pb-12">
  <div class="w-full max-w-md">

    <!-- Header compacto -->
    <div class="mb-5">
      <h1 class="font-citri-sans font-bold text-citri-gray-900 text-2xl md:text-3xl uppercase tracking-wide">
        Iniciar Sesión
      </h1>
      <p class="text-citri-gray-600 mt-1 text-sm">
        Los campos marcados con <span class="text-red-500 font-semibold">*</span> son obligatorios
      </p>
    </div>

    <!-- Tarjeta del formulario -->
    <div class="bg-white rounded-citri-lg shadow-citri-card p-6 md:p-8">
      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">

        <!-- Email -->
        <div>
          <label for="login-email" class="block text-sm font-medium text-citri-gray-900 mb-1">
            Email <span class="text-red-500">*</span>
          </label>
          <input
            id="login-email"
            name="email"
            type="email"
            formControlName="email"
            placeholder="tu@email.com"
            autocomplete="username email"
            class="w-full px-3 py-2.5 rounded-citri-sm border text-citri-gray-900 text-sm focus:outline-none focus:ring-2 transition-colors"
            [ngClass]="isInvalid('email') ? 'border-red-500 focus:ring-red-300' : 'border-citri-gray-300 focus:border-citri-green focus:ring-citri-green/20'"
          />
          @if (isInvalid('email')) {
            <p role="alert" class="text-red-600 text-sm mt-1">Introduce un email válido.</p>
          }
        </div>

        <!-- Contraseña -->
        <div>
          <label for="login-password" class="block text-sm font-medium text-citri-gray-900 mb-1">
            Contraseña <span class="text-red-500">*</span>
          </label>
          <div class="flex gap-2">
            <input
              id="login-password"
              name="password"
              [type]="showPassword() ? 'text' : 'password'"
              formControlName="password"
              placeholder="••••••••"
              autocomplete="current-password"
              class="min-w-0 flex-1 px-3 py-2.5 rounded-citri-sm border text-citri-gray-900 text-sm focus:outline-none focus:ring-2 transition-colors"
              [ngClass]="isInvalid('password') ? 'border-red-500 focus:ring-red-300' : 'border-citri-gray-300 focus:border-citri-green focus:ring-citri-green/20'"
            />
            <button
              type="button"
              (click)="togglePasswordVisibility()"
              class="px-3 py-2.5 rounded-citri-sm border border-citri-gray-300 text-citri-gray-500 hover:border-citri-green hover:text-citri-green transition-colors"
              [attr.aria-label]="showPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
            >
              @if (showPassword()) {
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                </svg>
              } @else {
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
              }
            </button>
          </div>
          @if (isInvalid('password')) {
            <p role="alert" class="text-red-600 text-sm mt-1">La contraseña es obligatoria.</p>
          }
        </div>

        <!-- Error general -->
        @if (errorMessage()) {
          <div class="rounded-citri-md bg-red-50 border border-red-200 p-3" role="alert">
            <p class="text-red-700 text-sm">{{ errorMessage() }}</p>
          </div>
        }

        <!-- Botón submit -->
        <button
          type="submit"
          class="w-full px-6 py-3 bg-citri-green text-white font-semibold rounded-citri-md hover:bg-citri-green-dark transition-colors duration-200"
        >
          Iniciar sesión
        </button>

        <!-- Links -->
        <div class="space-y-2 pt-1">
          <p class="text-sm text-citri-gray-600">
            ¿No tienes cuenta?
            <a routerLink="/registro" [queryParams]="route.snapshot.queryParamMap.get('redirectTo') ? { redirectTo: route.snapshot.queryParamMap.get('redirectTo') } : {}" class="text-citri-green font-semibold underline underline-offset-2 hover:text-citri-green-dark">
              Regístrate aquí
            </a>
          </p>
          <p class="text-sm">
            <a routerLink="/recuperar-password" class="text-citri-green underline underline-offset-2 hover:font-semibold transition cursor-pointer">
              He olvidado mi contraseña
            </a>
          </p>
        </div>

      </form>
    </div>
  </div>
</div>
